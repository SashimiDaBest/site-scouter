services:
  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - 80:5173
    environment:
      - VITE_BACKEND_URL=http://backend:8000

  backend:
    build:
      context: ./backend
    environment:
      PYTHONUNBUFFERED: 1

    restart: always
    ports:
      - 8000:8000

